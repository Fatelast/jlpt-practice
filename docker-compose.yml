version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: jlpt-practice-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: jlpt_practice
      MYSQL_USER: jlpt_user
      MYSQL_PASSWORD: jlpt_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
